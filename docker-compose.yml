services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    image: english-study-web:local
    container_name: english-study-web
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - study_net

  worker-pdf:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker-pdf
    image: english-study-worker-pdf:local
    container_name: english-study-worker-pdf
    env_file:
      - .env
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - study_net

  worker-ai:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker-ai
    image: english-study-worker-ai:local
    container_name: english-study-worker-ai
    env_file:
      - .env
      - path: .env.ai
        required: false
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - study_net

  redis:
    image: redis:7-alpine
    container_name: english-study-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - study_net

  migrations:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    image: english-study-migrations:local
    container_name: english-study-migrations
    profiles: ["tools"]
    env_file:
      - .env
    command: alembic upgrade head
    depends_on:
      db:
        condition: service_healthy
    networks:
      - study_net

  db:
    image: postgres:16-alpine
    container_name: english-study-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-english_study}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - study_net

volumes:
  pg_data:
  uploads_data:

networks:
  study_net:
    driver: bridge
